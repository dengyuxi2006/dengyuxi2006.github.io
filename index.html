<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>邓羽希 | 个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f0f7ff;
      color: #2d3748;
      line-height: 1.7;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .avatar img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #4299e1;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2.2rem;
      color: #2b6cb0;
      margin-bottom: 8px;
    }
    .title {
      font-size: 1.1rem;
      color: #4a5568;
      margin-bottom: 12px;
    }
    .intro {
      font-size: 1rem;
      color: #718096;
      max-width: 500px;
      margin: 0 auto 30px;
    }
    .info {
      text-align: center;
      margin-bottom: 30px;
    }
    .info a {
      color: #3182ce;
      text-decoration: none;
      margin: 0 10px;
    }
    .info a:hover {
      text-decoration: underline;
    }
    .section {
      margin-bottom: 30px;
    }
    .section h2 {
      font-size: 1.4rem;
      color: #2c5282;
      border-left: 4px solid #4299e1;
      padding-left: 12px;
      margin-bottom: 16px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .tag {
      background: #e6f7ff;
      color: #2b6cb0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    .quote {
      text-align: center;
      font-style: italic;
      color: #4a5568;
      font-size: 1.1rem;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="avatar">
        <img src="avatar.jpg" alt="邓羽希头像" />
      </div>
      <h1>邓羽希</h1>
      <div class="title">北京大学 2024级 医学技术专业 本科</div>
      <div class="intro">一枚INFP，比较内向，目前在探索流行病学以及医学人工智能。</div>
    </div>

    <div class="info">
      <a href="mailto:dnegyuxi2006@163.com">邮箱</a>
      <a href="https://github.com/dengyuxi2006" target="_blank">GitHub</a>
    </div>

    <div class="section">
      <h2>技能与爱好</h2>
      <div class="tags">
        <div class="tag">轮滑</div>
        <div class="tag">乒乓球</div>
        <div class="tag">人工智能</div>
      </div>
    </div>

    <div class="quote">世上无难事，只怕有心人。</div>
  </div>
</body>
</html>
